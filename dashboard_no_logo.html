<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Accès Véhicules - Mercedes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-image:url("./images/mecedes_benz.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
font-family:Arial;
color:white;
padding:20px;
}

.container-box{
background:transparent;
padding:30px;
border-radius:15px;
}

.header{text-align:center;}
.header h1{color:#c9a227;font-weight:bold;}

.logo-center{
display:flex;
justify-content:center;
margin:20px;
}

.logo-center img{
width:120px;
border-radius:50%;
border:2px solid #0d0d0d;
background:black;
padding:10px;
}

/* ===== STAT CARDS ===== */

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:25px;
flex-wrap:wrap;
}

.stat-card{
background:#111;
padding:20px;
border-radius:12px;
text-align:center;
width:220px;
box-shadow:0 5px 20px rgba(0,0,0,0.6);
}

.stat-card h2{
font-size:35px;
margin:0;
}

.total{border-left:5px solid #2563eb;}
.autorise{border-left:5px solid #16a34a;}
.refuse{border-left:5px solid #dc2626;}

/* ===== TABLE ===== */

table{
background:#111;
color:white;
font-size:14px;
width:70%;
margin:auto;
border-radius:10px;
overflow:hidden;
}

table th, table td{
padding:6px 10px !important;
text-align:center;
}

thead{
color:#c9a227;
}

.status-AUTORISÉ{background:#14532d !important;}
.status-REFUSÉ{background:#7f1d1d !important;}

/* ===== NOTIFICATIONS ===== */

#notificationContainer{
position:fixed;
top:20px;
right:20px;
z-index:9999;
}

.notification{
padding:15px;
margin-bottom:10px;
border-radius:10px;
color:white;
font-weight:bold;
}

.AUTORISÉ{background:#16a34a;}
.REFUSÉ{background:#dc2626;}

footer{
text-align:center;
margin-top:25px;
color:#ccc;
}

</style>
</head>

<body>

<div class="container-box">

<div class="header">
<h1>🚦 Dashboard Accès Véhicules</h1>
<p>Système Intelligent Mercedes-Benz</p>
</div>

<div class="logo-center">
<img src="./images/mercedes_logo.png">
</div>

<!-- ===== COMPTEURS ===== -->

<div class="stats">

<div class="stat-card total">
<p>Total Voitures</p>
<h2 id="nbTotal">0</h2>
</div>

<div class="stat-card autorise">
<p>Accès Autorisés</p>
<h2 id="nbAutorise">0</h2>
</div>

<div class="stat-card refuse">
<p>Accès Refusés</p>
<h2 id="nbRefuse">0</h2>
</div>

</div>

<!-- ===== TABLE ===== -->

<table class="table table-hover">
<thead>
<tr>
<th>Matricule</th>
<th>Date & Heure</th>
<th>Statut</th>
</tr>
</thead>
<tbody id="accesTable"></tbody>
</table>

<footer>
© 2026 — Société Le Moteur S.A | Mercedes-Benz
</footer>

</div>

<div id="notificationContainer"></div>

<script>

let lastCount=0;

async function fetchAcces(){

const response=await fetch("http://127.0.0.1:5000/api/acces");
const data=await response.json();

if(lastCount!==0 && data.length>lastCount){
const newItems=data.slice(0,data.length-lastCount);
newItems.reverse().forEach(showNotification);
}

lastCount=data.length;

renderTable(data);
renderStats(data);
}

function renderStats(data){

const total = data.length;
const autorise = data.filter(d=>d.statut==="AUTORISÉ").length;
const refuse = data.filter(d=>d.statut==="REFUSÉ").length;

document.getElementById("nbTotal").innerText = total;
document.getElementById("nbAutorise").innerText = autorise;
document.getElementById("nbRefuse").innerText = refuse;
}

function renderTable(data){

const tbody=document.getElementById("accesTable");
tbody.innerHTML="";

data.forEach(item=>{

const row=document.createElement("tr");
const statusClass=item.statut==="AUTORISÉ"?"status-AUTORISÉ":"status-REFUSÉ";

row.innerHTML=`
<td>${item.matricule}</td>
<td>${item.date_heure}</td>
<td class="${statusClass}">${item.statut}</td>
`;

tbody.appendChild(row);

});
}

function showNotification(item){

const container=document.getElementById("notificationContainer");

const div=document.createElement("div");
div.className=`notification ${item.statut}`;
div.innerHTML=`${item.matricule} - ${item.statut}<br>${item.date_heure}`;

container.appendChild(div);

setTimeout(()=>container.removeChild(div),5000);
}

fetchAcces();
setInterval(fetchAcces,5000);

</script>

</body>
</html>
